<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDoa - Contrato Mágico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           TEMA: PUELLA MAGI MADOKA MAGICA
           ========================================= */
        
        :root {
            --cor-fundo: #1a0b2e; /* Roxo muito escuro (Labirinto) */
            --cor-rosa-neon: #ff66b2; /* Rosa Madoka */
            --cor-rosa-brilho: rgba(255, 102, 178, 0.6);
            --cor-dourado: #f5d547; /* Amarelo Mami */
            --cor-card: #2a164a; /* Roxo intermediário */
            --cor-texto: #fce4ec; /* Branco rosado */
        }

        /* Fundo Xadrez Sutil (Estilo Bruxa) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--cor-fundo);
            background-image: 
                repeating-linear-gradient(45 deg, rgba(0,0,0,0.1) 25 %, transparent 25 %, transparent 75 %, rgba(0,0,0,0.1) 75 %, rgba(0,0,0,0.1)), 
                repeating-linear-gradient(45 deg, rgba(0,0,0,0.1) 25 %, var(--cor-fundo) 25 %, var(--cor-fundo) 75 %, rgba(0,0,0,0.1) 75%, rgba(0,0,0,0.1));
            background-position: 0 0, 20 px 20 px;
            background-size: 40 px 40 px;
            color: var(--cor-texto);
        }

        /* Cabeçalho com Brilho Neon */
        header {
            background-color: rgba(26, 11, 46, 0.9);
            padding: 20 px 50 px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2 px solid var(--cor-rosa-neon);
            box-shadow: 0 0 15 px var(--cor-rosa-brilho);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2.5 rem;
            color: var(--cor-rosa-neon);
            text-shadow: 0 0 10 px var(--cor-rosa-brilho), 0 0 20 px var(--cor-rosa-brilho);
            margin: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20 px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: var(--cor-texto);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1 px;
            transition: 0.3 s;
        }

        nav a:hover {
            color: var(--cor-rosa-neon);
            text-shadow: 0 0 8 px var(--cor-rosa-brilho);
        }

        /* Container Principal do Mural */
        .container {
            max-width: 1200 px;
            margin: 40 px auto;
            padding: 0 20 px;
        }

        .titulo-secao {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 2 rem;
            margin-bottom: 40 px;
