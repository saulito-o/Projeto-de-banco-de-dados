<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>EcoDoa ✨</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#ffd6f5,#e7c6ff,#cdb4db);
    color:#3a2e4f;
}

/* NAVBAR */

nav{
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#d63384;
}

.menu a{
    text-decoration:none;
    margin-left:20px;
    color:#5a3d6e;
    font-weight:600;
}

/* HERO */

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:48px;
    color:#b5179e;
}

.hero p{
    font-size:20px;
}

.hero button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff8fab,#c77dff);
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FORM */

.container{
    width:90%;
    max-width:900px;
    margin:auto;
}

.form-card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-top:40px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.form-card h2{
    text-align:center;
    color:#9d4edd;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

button.submit{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,#ff8fab,#9d4edd);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* ITENS */

.itens{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:40px;
}

.item{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.item h3{
    color:#c9184a;
}

.item button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:#c77dff;
    color:white;
}

footer{
    margin-top:80px;
    text-align:center;
    padding:20px;
    background:rgba(255,255,255,0.5);
}

</style>
</head>

<body>

<nav>
<div class="logo">EcoDoa ✨</div>

<div class="menu">
<a href="#">Início</a>
<a href="#">Doações</a>
<a href="#">ONGs</a>
<a href="#">Login</a>
</div>
</nav>

<section class="hero">
<h1>Transforme Desapego em Magia</h1>
<p>Conectando pessoas que querem doar com quem realmente precisa.</p>

<button>Doar um Item 💖</button>
</section>

<div class="container">

<div class="form-card">

<h2>Cadastrar Doação</h2>

<form>

<label>Nome do Item</label>
<input type="text" placeholder="Ex: Geladeira usada">

<label>Categoria</label>
<input type="text" placeholder="Móveis, roupas, eletrônicos">

<label>Descrição</label>
<textarea placeholder="Descreva o item"></textarea>

<label>Cidade</label>
<input type="text">

<button class="submit">Cadastrar Item ✨</button>

</form>

</div>

<div class="itens">

<div class="item">
<h3>Sofá</h3>
<p>Bom estado</p>
<button>Reservar</button>
</div>

<div class="item">
<h3>Geladeira</h3>
<p>Funcionando</p>
<button>Reservar</button>
</div>

<div class="item">
<h3>Roupas</h3>
<p>Variadas</p>
<button>Reservar</button>
</div>

</div>

</div>

<footer>
EcoDoa 🌙 Conectando solidariedade e sustentabilidade
</footer>

</body>
</html>
